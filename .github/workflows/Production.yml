name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set git safe directory
        run: git config --global --add safe.directory /app

      - name: Install PHP & Composer dependencies
        uses: php-actions/composer@v6
        with:
          command: install
          args: --ignore-platform-reqs

      - name: Require Laravel Envoy 
        uses: php-actions/composer@v6 
        with: 
          command: require 
          args: laravel/envoy --dev --ignore-platform-reqs

      - name: Setup SSH
        run: |
          echo "${{ secrets.MANAVAULT_PROD_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/id_rsa
          ssh-keyscan -H 188.166.211.251 >> ~/.ssh/known_hosts

      - name: Run Deployment
        run: envoy run deploy
